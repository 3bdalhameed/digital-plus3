services:
  storefront:
    # Build directly from the git repo Coolify already checks out --
    # bypasses the ghcr.io :latest tag and the GitHub Actions build
    # cache that were both stuck on the July 10 image, so no code
    # change was reaching the running container. Every Coolify deploy
    # now runs `docker build` against the freshly-cloned source.
    # Coolify runs `docker compose` with `--project-directory` set to
    # the repo root, so relative paths in this file resolve from there
    # (not from apps/storefront/). context must be `.` -- an earlier
    # `../../` climbed above the artifact dir and buildx died with
    # `lstat /apps: no such file or directory`.
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # ── Database (Prisma) ──
      DATABASE_URL: ${DATABASE_URL:-${CMS_DATABASE_URL:-}}
      CMS_DATABASE_URL: ${CMS_DATABASE_URL:-}
      # ── Auth ──
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-}
      # Auth.js v5 names + proxy trust. Behind Cloudflare -> Coolify these
      # must reach the container or NextAuth mis-derives HTTPS and every
      # sign-in fails with "MissingCSRF".
      AUTH_URL: ${AUTH_URL:-${NEXTAUTH_URL:-}}
      AUTH_SECRET: ${AUTH_SECRET:-${NEXTAUTH_SECRET:-}}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # ── CMS ──
      PAYLOAD_API_URL: ${PAYLOAD_API_URL:-}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-}
      PAYLOAD_INTERNAL_SECRET: ${PAYLOAD_INTERNAL_SECRET:-}
      PREVIEW_SECRET: ${PREVIEW_SECRET:-}
      # ── Site ──
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      STOREFRONT_URL: ${STOREFRONT_URL:-}
      # ── Email ──
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      # ── Build metadata ──
      COMMIT_SHA: ${COMMIT_SHA:-unknown}
