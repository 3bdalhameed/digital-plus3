services:
  storefront:
    image: ghcr.io/3bdalhameed/digital-plus3/storefront:latest
    # Without this, Docker Compose reuses the locally cached :latest tag
    # and never fetches the updated image from GHCR — meaning CI builds
    # an image with new files (e.g. public/ assets) but Coolify keeps
    # running the old one. Same fix as commit 28404c9d on the CMS.
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # ── Database (Prisma) ──
      DATABASE_URL: ${DATABASE_URL:-${CMS_DATABASE_URL:-}}
      CMS_DATABASE_URL: ${CMS_DATABASE_URL:-}
      # ── Auth ──
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # ── CMS ──
      PAYLOAD_API_URL: ${PAYLOAD_API_URL:-}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-}
      PAYLOAD_INTERNAL_SECRET: ${PAYLOAD_INTERNAL_SECRET:-}
      PREVIEW_SECRET: ${PREVIEW_SECRET:-}
      # ── Site ──
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      STOREFRONT_URL: ${STOREFRONT_URL:-}
      # ── Email ──
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      # ── Build metadata ──
      COMMIT_SHA: ${COMMIT_SHA:-unknown}
