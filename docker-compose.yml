version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: my_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Payload CMS ──────────────────────────────────────
  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URI: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/my_store
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: ${CMS_PUBLIC_URL}
      STOREFRONT_URL: ${STOREFRONT_PUBLIC_URL}
      PAYLOAD_INTERNAL_SECRET: ${PAYLOAD_INTERNAL_SECRET}
      PREVIEW_SECRET: ${PREVIEW_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION:-auto}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    networks:
      - internal
      - web
    depends_on:
      postgres:
        condition: service_healthy

  # ── Next.js Storefront ───────────────────────────────
  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Both point to VPS postgres — same DB, same data
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/my_store
      CMS_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/my_store
      # Internal URL (container-to-container, no TLS needed)
      PAYLOAD_API_URL: http://cms:3001/api
      PAYLOAD_INTERNAL_SECRET: ${PAYLOAD_INTERNAL_SECRET}
      NEXTAUTH_URL: ${STOREFRONT_PUBLIC_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      PREVIEW_SECRET: ${PREVIEW_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      CRON_SECRET: ${CRON_SECRET}
      AIRWALLEX_CLIENT_ID: ${AIRWALLEX_CLIENT_ID:-}
      AIRWALLEX_API_KEY: ${AIRWALLEX_API_KEY:-}
      AIRWALLEX_WEBHOOK_SECRET: ${AIRWALLEX_WEBHOOK_SECRET:-}
      AIRWALLEX_ENV: ${AIRWALLEX_ENV:-demo}
    networks:
      - internal
      - web
    depends_on:
      postgres:
        condition: service_healthy
      cms:
        condition: service_started

networks:
  internal:
    internal: true   # No external access — only containers can talk here
  web:
    driver: bridge   # Nginx on host connects through this

volumes:
  postgres_data:
    driver: local
