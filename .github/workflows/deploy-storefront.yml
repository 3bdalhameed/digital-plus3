name: Build & Deploy Storefront

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/storefront/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      # Own file included so edits to the CI workflow itself trigger
      # a rebuild -- previously changing this yaml did nothing until an
      # unrelated storefront change came through.
      - ".github/workflows/deploy-storefront.yml"

env:
  IMAGE: ghcr.io/3bdalhameed/digital-plus3/storefront

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/storefront/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}
          # GHA cache disabled — a poisoned cache layer was pinning
          # the built .next/ output to the July 10 bundle across every
          # subsequent run (build finished in ~2 min instead of the
          # ~5 min a real Next.js build needs, and the bundle hash
          # never changed regardless of source edits). Turning cache
          # off forces every build to rebuild from scratch. Slower but
          # correct; can be re-enabled once the cache is proven clean.
          no-cache: true

      - name: Trigger Coolify redeploy
        env:
          WEBHOOK: ${{ secrets.COOLIFY_STOREFRONT_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        # Coolify v4 requires the API token in the Authorization header --
        # the previous "no auth" version returned 401 silently, leaving
        # newly-built images in GHCR unused. Fails loudly now if it can't
        # call Coolify so the issue surfaces immediately.
        if: env.WEBHOOK != '' && env.COOLIFY_TOKEN != ''
        run: |
          curl -fsSL -X GET "$WEBHOOK" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"
