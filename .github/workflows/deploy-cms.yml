name: Build & Deploy CMS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/cms/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

env:
  IMAGE: ghcr.io/3bdalhameed/digital-plus3/cms

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cms/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PAYLOAD_PUBLIC_SERVER_URL=${{ secrets.CMS_URL }}
            COMMIT_SHA=${{ github.sha }}
            CACHE_BUST=${{ github.run_id }}

      - name: Trigger Coolify redeploy
        env:
          WEBHOOK: ${{ secrets.COOLIFY_CMS_WEBHOOK }}
        if: env.WEBHOOK != ''
        continue-on-error: true
        run: curl -fsSL -X GET "$WEBHOOK"
